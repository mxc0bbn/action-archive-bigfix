name: Bug Report
description: Report something that isn't working correctly in Action Archive
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the fields below so we can reproduce and fix the issue as quickly as possible.

        **Security issues**: Please do NOT report security vulnerabilities here. Use a private channel instead (see SECURITY.md or contact the maintainer directly).

  - type: input
    id: version
    attributes:
      label: Action Archive Version
      description: Found under Administration → Settings → About
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Server OS / Version
      description: The OS where Action Archive is installed
      placeholder: "Rocky Linux 9.3"
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser (if UI-related)
      description: Name and version of the browser where the issue occurred
      placeholder: "Firefox 124, Chrome 123, Safari 17"

  - type: dropdown
    id: theme
    attributes:
      label: Theme (if UI-related)
      options:
        - Not applicable
        - Dark (default)
        - Light (Gold Light)

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the problem
      placeholder: "When I click X, the page does Y instead of Z..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Numbered steps someone else could follow to reproduce the issue
      placeholder: |
        1. Log in as Admin
        2. Go to Administration → Collection
        3. Click "Run Now"
        4. Observe error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any relevant log lines from /var/log/bigfix-archive/ or the browser console. These will be automatically formatted as code.
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, network conditions, BigFix version, anything else that might help.
