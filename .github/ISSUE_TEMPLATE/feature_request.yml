name: Feature Request
description: Suggest a new feature or enhancement for Action Archive
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! For open-ended ideas or discussion, consider starting a thread in [Discussions → Ideas](../discussions/categories/ideas) instead — Issues work best for concrete, actionable proposals.

  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the pain point or gap you're running into. Focus on the "why" before the "what".
      placeholder: "When managing X, I find it difficult to Y because..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like this to work? UI mockups, example workflows, or command examples are welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about and why you didn't pick them.

  - type: dropdown
    id: scope
    attributes:
      label: Area of the app
      description: Which part of Action Archive would this affect?
      options:
        - UI / Frontend
        - Collection (BigFix data ingest)
        - Reporting / Visualization
        - Administration (users, settings, logs)
        - API / Integrations
        - Security / Authentication
        - Installer / Deployment
        - Documentation
        - Other / Not sure
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, links to related issues, BigFix version, environment size, anything else that helps frame the request.
